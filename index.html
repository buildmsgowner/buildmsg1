<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>buildmsg</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none !important;
            background: #1a1a1a;
            color: white !important;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #app-container { width: 90%; text-align: center; }
        input, textarea {
            width: 100%; background: #333; border: 1px solid #444;
            color: white; padding: 10px; margin: 10px 0; border-radius: 8px;
            font-size: 16px;
        }
        button {
            background: #ff4757; color: white; border: none;
            padding: 15px 30px; border-radius: 25px; font-weight: bold;
            margin-top: 10px;
        }
        #progress-wrapper { display: none; width: 100%; margin-top: 30px; }
        #track {
            width: 100%; height: 12px; background: #333;
            border-radius: 6px; position: relative; margin-bottom: 15px;
            overflow: hidden;
        }
        #bar {
            width: 0%; height: 100%; background: #2ecc71;
            transition: width 0.3s linear;
        }
        #status { font-size: 14px; color: #aaa; }
        #notification-box {
            display: none; background: #2ecc71; padding: 20px;
            border-radius: 15px; margin-top: 20px; border: 2px solid white;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="setup-ui">
        <h2>buildmsg write your email before the body</h2>
        <input type="text" id="targetName" placeholder="Recipient Name">
        <textarea id="messageContent" rows="4" placeholder="Crate Message..."></textarea>
        <button onclick="startRolling()">Send Crate</button>
    </div>

    <div id="progress-wrapper">
        <div id="track">
            <div id="bar"></div>
        </div>
        <p id="status">Preparing crate</p>
        
        <div id="notification-box">
            <h3>it has arrived</h3>
            <p id="deliveredMsg"></p>
            <button onclick="location.reload()">Reset</button>
        </div>
    </div>
</div>

<script>
    async function startRolling() {
        const name = document.getElementById('targetName').value;
        const msg = document.getElementById('messageContent').value;
        if (!name || !msg) return;
        
        if (Notification.permission !== "granted") {
            await Notification.requestPermission();
        }

        document.getElementById('setup-ui').style.display = 'none';
        document.getElementById('progress-wrapper').style.display = 'block';

        let distance = 10; 
        for (let i = 1; i <= distance; i++) {
            await new Promise(r => setTimeout(r, 1000));
            let percent = (i / distance) * 100;
            document.getElementById('bar').style.width = percent + "%";
            document.getElementById('status').innerText = "Crate zooming to " + name + "... " + i + "km";
        }
        
        if (Notification.permission === "granted") {
            new Notification("New Crate Arrived", {
                body: "From uhh idk: " + msg,
                vibrate: [200, 100, 200]
            });
        }

        document.getElementById('status').style.display = 'none';
        document.getElementById('notification-box').style.display = 'block';
        document.getElementById('deliveredMsg').innerText = msg;
    }
</script>

</body>
</html>
