<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BuildMsg</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none !important;
            background: #1a1a1a;
            color: white !important;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #app-container { width: 90%; text-align: center; }
        input, textarea {
            width: 100%; background: #333; border: 1px solid #444;
            color: white; padding: 12px; margin: 10px 0; border-radius: 8px;
            font-size: 16px; box-sizing: border-box;
        }
        button {
            background: #ff4757; color: white; border: none;
            padding: 18px 40px; border-radius: 30px; font-weight: bold;
            font-size: 18px; margin-top: 15px; width: 100%;
        }
        #progress-wrapper { display: none; width: 100%; margin-top: 30px; }
        #track {
            width: 100%; height: 15px; background: #333;
            border-radius: 10px; overflow: hidden;
        }
        #bar { width: 0%; height: 100%; background: #2ecc71; transition: width 0.3s linear; }
        #status { font-size: 14px; color: #aaa; margin-top: 10px; }
        #notification-box {
            display: none; background: #2ecc71; padding: 20px;
            border-radius: 15px; margin-top: 20px; border: 2px solid white;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="setup-ui">
        <h2>buildmsg email first in crate message</h2>
        <input type="text" id="targetName" placeholder="Recipient Name">
        <textarea id="messageContent" rows="4" placeholder="Crate Message..."></textarea>
        <button id="sendBtn" onclick="startRolling()">Send Crate</button>
    </div>

    <div id="progress-wrapper">
        <div id="track"><div id="bar"></div></div>
        <p id="status">Preparing</p>
        <div id="notification-box">
            <h3>CRATE ARRIVED</h3>
            <p id="deliveredMsg"></p>
            <button onclick="location.reload()">Reset</button>
        </div>
    </div>
</div>

<script>
    function startRolling() {
        const name = document.getElementById('targetName').value;
        const msg = document.getElementById('messageContent').value;
        
        if (!name || !msg) {
            alert("Fill it all out dawg");
            return;
        }
        
        if (Notification.permission === "default") {
            Notification.requestPermission();
        }

        document.getElementById('setup-ui').style.display = 'none';
        document.getElementById('progress-wrapper').style.display = 'block';

        let distance = 10; 
        let current = 0;

        let interval = setInterval(() => {
            current++;
            let percent = (current / distance) * 100;
            document.getElementById('bar').style.width = percent + "%";
            document.getElementById('status').innerText = "Crate zooming... " + current + "km";

            if (current >= distance) {
                clearInterval(interval);
                finishDelivery(name, msg);
            }
        }, 1000);
    }

    function finishDelivery(name, msg) {
        if (Notification.permission === "granted") {
            new Notification("New Crate", { body: "From uhh idk: " + msg });
        }
        document.getElementById('status').style.display = 'none';
        document.getElementById('notification-box').style.display = 'block';
        document.getElementById('deliveredMsg').innerText = "To " + name + ": " + msg;
    }
</script>
</body>
</html>
