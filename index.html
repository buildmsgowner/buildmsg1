<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>buildmsg v1</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none !important;
            background: #1a1a1a;
            color: white !important;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #app-container { width: 90%; text-align: center; }
        input, textarea {
            width: 100%; background: #333; border: 1px solid #444;
            color: white; padding: 10px; margin: 10px 0; border-radius: 8px;
        }
        button {
            background: #ff4757; color: white; border: none;
            padding: 15px 30px; border-radius: 25px; font-weight: bold;
        }
        #progress-wrapper { display: none; width: 100%; margin-top: 30px; }
        #track {
            width: 100%; height: 10px; background: #333;
            border-radius: 5px; position: relative; margin-bottom: 10px;
        }
        #bar {
            width: 0%; height: 100%; background: #2ecc71;
            border-radius: 5px; transition: width 0.5s;
        }
        #folder-icon { position: absolute; right: 0; top: -25px; font-size: 20px; }
        #status { font-size: 14px; color: #aaa; }
        
        #notification {
            display: none;
            background: #2ecc71;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            border: 2px solid white;
        }
    </style>
</head>
<body>
<div id="app-container">
    <div id="setup-ui">
        <h2>buildmsg</h2>
        <input type="text" id="targetName" placeholder="Recipient Name">
        <textarea id="messageContent" rows="5" placeholder="Message inside the crate..."></textarea>
        <button onclick="startRolling()">Send Crate</button>
    </div>

    <div id="progress-wrapper">
        <div id="track">
            <div id="bar"></div>
            <div id="folder-icon">📁</div>
        </div>
        <p id="status">Crate is rolling</p>
        
        <div id="notification">
            <h3>NEW CRATE ARRIVED</h3>
            <p id="deliveredMsg"></p>
            <button onclick="location.reload()">Send Another</button>
        </div>
    </div>
</div>

<script>
    async function startRolling() {
        const name = document.getElementById('targetName').value;
        const msg = document.getElementById('messageContent').value;
        if (!name || !msg) return;

        document.getElementById('setup-ui').style.display = 'none';
        document.getElementById('progress-wrapper').style.display = 'block';

        let distance = 5; 
        for (let i = 1; i <= distance; i++) {
            await new Promise(r => setTimeout(r, 1000)); 
            let percent = (i / distance) * 100;
            document.getElementById('bar').style.width = percent + "%";
            document.getElementById('status').innerText = "Crate rolling to " + name + "... " + i + "km";
        }

        document.getElementById('status').style.display = 'none';
        document.getElementById('notification').style.display = 'block';
        document.getElementById('deliveredMsg').innerText = "From Crate: " + msg;
    }
</script>
</body>
</html>
